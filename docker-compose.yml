version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: medikart_db
    environment:
      SA_PASSWORD: "Pass@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssqldata:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: MediKartX.API/Dockerfile
    container_name: medikart_api
    depends_on:
      - db
    environment:
      - DB_CONNECTION=Server=db,1433;Database=MediKartX;User Id=sa;Password=Pass@123;TrustServerCertificate=True;
      - JWT_KEY=${JWT_KEY}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - PORT_HTTP=80
      - PORT_HTTPS=443
      - HOST_NAME=0.0.0.0
    ports:
      - "5126:80"
    restart: unless-stopped

volumes:
  mssqldata:
